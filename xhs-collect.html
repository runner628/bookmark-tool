<!DOCTYPE html>
<!--
  ============================================================
  小红书收藏夹分类整理工具
  ============================================================
  功能：粘贴小红书收藏链接 → 按分类整理 → 生成可视化收藏夹页面
  支持：拖拽分类、批量导出、搜索筛选、生成书签/Markdown/HTML
  部署：可本地打开，也可部署到 GitHub Pages
  使用：
    1. 安装「XHS-Downloader」Tampermonkey 用户脚本
    2. 打开小红书收藏页，用脚本提取所有收藏链接
    3. 粘贴链接到本工具
    4. 工具自动抓取每条笔记的标题/封面/分类
    5. 可视化分类展示，支持搜索、筛选、导出
  ============================================================
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>小红书收藏夹整理工具</title>
<style>
/* ============================================================
   CSS 变量表
   ============================================================ */
:root {
    --red: #ff2442;
    --red-light: #fff0f2;
    --red-dark: #cc1a35;
    --bg: #f7f8fa;
    --card-bg: #ffffff;
    --text-primary: #333333;
    --text-secondary: #666666;
    --text-tertiary: #999999;
    --border: #eeeeee;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
}
/* ============================================================
   全局基础样式
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 20px 16px 40px;
    -webkit-font-smoothing: antialiased;
}
.container { max-width: 720px; margin: 0 auto; }

/* ============================================================
   头部
   ============================================================ */
.header { text-align: center; padding: 24px 0 20px; }
.header .icon { font-size: 48px; margin-bottom: 8px; display: block; }
.header h1 {
    font-size: 24px; font-weight: 800; color: var(--red);
    letter-spacing: -0.3px;
}
.header p { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; }

/* ============================================================
   卡片组件
   ============================================================ */
.card {
    background: var(--card-bg); border-radius: var(--radius-lg);
    padding: 20px; margin-bottom: 14px;
    box-shadow: var(--shadow-sm); border: 1px solid var(--border);
}
.card-title {
    font-size: 14px; font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
}

/* ============================================================
   输入区
   ============================================================ */
textarea {
    width: 100%; min-height: 120px; border: 2px solid var(--border);
    border-radius: var(--radius-md); padding: 14px; font-size: 13px;
    font-family: "SF Mono", "Cascadia Code", monospace; line-height: 1.7;
    resize: vertical; outline: none; background: #fafafa; color: var(--text-primary);
    transition: border-color 0.2s;
}
textarea:focus { border-color: var(--red); background: #fff; }
textarea::placeholder { color: #ccc; }

.input-row { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
.input-row input[type="text"] {
    flex: 1; padding: 11px 14px; border: 2px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; outline: none;
    transition: border-color 0.2s;
}
.input-row input[type="text"]:focus { border-color: var(--red); }

/* ============================================================
   按钮
   ============================================================ */
.btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 5px; padding: 11px 20px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
    background: var(--red); color: #fff;
    box-shadow: 0 2px 8px rgba(255,36,66,0.3);
}
.btn-primary:hover { background: var(--red-dark); }
.btn-outline {
    background: #fff; color: var(--red); border: 2px solid var(--red);
    padding: 9px 18px;
}
.btn-outline:hover { background: var(--red-light); }
.btn-sm { padding: 8px 14px; font-size: 12px; }
.btn-full { width: 100%; }

/* ============================================================
   进度条
   ============================================================ */
.progress-wrap { display: none; margin-top: 14px; }
.progress-wrap.show { display: block; }
.progress-bar-bg {
    width: 100%; height: 6px; background: #f0f0f0; border-radius: 3px;
    overflow: hidden;
}
.progress-bar {
    height: 100%; background: linear-gradient(90deg, var(--red), #ff6b81);
    border-radius: 3px; transition: width 0.3s ease; width: 0%;
}
.progress-text { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; text-align: center; }

/* ============================================================
   分类标签栏
   ============================================================ */
.tabs {
    display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 14px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    flex-shrink: 0; padding: 7px 16px; border-radius: 20px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
    background: #f5f5f5; color: var(--text-secondary);
    -webkit-tap-highlight-color: transparent;
}
.tab.active { background: var(--red); color: #fff; }
.tab:hover:not(.active) { background: #eee; }

/* ============================================================
   搜索栏
   ============================================================ */
.search-bar {
    display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
}
.search-bar input {
    flex: 1; padding: 10px 14px; border: 2px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; outline: none;
    transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--red); }

/* ============================================================
   笔记卡片网格
   ============================================================ */
.note-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
}
@media (min-width: 500px) {
    .note-grid { grid-template-columns: repeat(3, 1fr); }
}
.note-card {
    border-radius: var(--radius-md); overflow: hidden; background: #fff;
    box-shadow: var(--shadow-sm); border: 1px solid var(--border);
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
}
.note-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.note-card .cover {
    width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
    background: #f5f5f5;
}
.note-card .info { padding: 8px 10px 10px; }
.note-card .title {
    font-size: 12px; font-weight: 600; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; color: var(--text-primary);
}
.note-card .author {
    font-size: 11px; color: var(--text-tertiary); margin-top: 4px;
}
/* 分类标签（右上角） */
.note-card .cat-badge {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.55); color: #fff;
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    backdrop-filter: blur(4px);
}
/* 选中态 */
.note-card.selected { outline: 3px solid var(--red); outline-offset: -1px; }
.note-card .check {
    position: absolute; top: 6px; left: 6px; width: 22px; height: 22px;
    border-radius: 50%; border: 2px solid #fff; background: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: transparent; transition: all 0.15s;
}
.note-card.selected .check { background: var(--red); color: #fff; border-color: var(--red); }

/* ============================================================
   统计栏
   ============================================================ */
.stats-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; font-size: 13px; color: var(--text-secondary);
}
.stats-bar .num { font-weight: 700; color: var(--red); }

/* ============================================================
   空状态
   ============================================================ */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-tertiary); }
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ============================================================
   导出弹窗
   ============================================================ */
.modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
    background: #fff; border-radius: var(--radius-lg); padding: 24px;
    max-width: 400px; width: 100%; box-shadow: var(--shadow-lg);
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal .export-opts { display: flex; flex-direction: column; gap: 10px; }
.modal .export-opt {
    padding: 14px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    background: #fff; text-align: left; width: 100%;
}
.modal .export-opt:hover { border-color: var(--red); background: var(--red-light); }
.modal .close-btn {
    margin-top: 16px; width: 100%; padding: 12px; border: none;
    background: #f5f5f5; border-radius: var(--radius-sm); font-size: 14px;
    font-weight: 600; cursor: pointer; color: var(--text-secondary);
}

/* ============================================================
   Toast
   ============================================================ */
.toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 12px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 600; z-index: 200; opacity: 0;
    transition: all 0.3s; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #10b981; }
.toast.error { background: #f43f5e; }

/* ============================================================
   页脚
   ============================================================ */
.footer {
    text-align: center; padding: 20px 0 0; font-size: 11px;
    color: var(--text-tertiary); line-height: 1.8;
}
.footer a { color: var(--red); text-decoration: none; }

/* ============================================================
   帮助说明
   ============================================================ */
.help { margin-top: 12px; font-size: 12px; color: var(--text-tertiary); line-height: 1.8; }
.help a { color: var(--red); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 导出弹窗 -->
<div class="modal-overlay" id="exportModal">
    <div class="modal">
        <h3>📤 选择导出格式</h3>
        <div class="export-opts">
            <button class="export-opt" onclick="exportAs('html')">📄 导出为 HTML 收藏页</button>
            <button class="export-opt" onclick="exportAs('md')">📝 导出为 Markdown 文件</button>
            <button class="export-opt" onclick="exportAs('json')">📋 导出为 JSON 数据</button>
            <button class="export-opt" onclick="exportAs('bookmarks')">🔖 导出为浏览器书签</button>
        </div>
        <button class="close-btn" onclick="document.getElementById('exportModal').classList.remove('show')">取消</button>
    </div>
</div>

<div class="container">

    <!-- 头部 -->
    <div class="header">
        <span class="icon">📕</span>
        <h1>小红书收藏整理</h1>
        <p>粘贴收藏链接 → 自动分类 → 导出整理结果</p>
    </div>

    <!-- 输入卡片 -->
    <div class="card">
        <div class="card-title">📋 粘贴收藏链接</div>
        <textarea id="urlInput" placeholder="粘贴小红书收藏链接，每行一个，例如：
https://www.xiaohongshu.com/explore/1234567890abcdef
https://www.xiaohongshu.com/explore/abcdef1234567890

※ 获取方式：安装 XHS-Downloader 用户脚本，在收藏页点击「提取收藏作品链接」"></textarea>
        <div class="input-row">
            <input type="text" id="defaultCat" placeholder="默认分类名" value="未分类">
            <button class="btn btn-primary" onclick="parseNotes()" id="parseBtn">解析笔记</button>
        </div>
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
            <div class="progress-text" id="progressText">正在解析...</div>
        </div>
    </div>

    <!-- 操作栏（解析后显示） -->
    <div class="card" id="actionCard" style="display:none;">
        <div class="stats-bar">
            <span>共 <span class="num" id="totalCount">0</span> 篇笔记</span>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-outline btn-sm" onclick="selectAllNotes(true)">全选</button>
                <button class="btn btn-outline btn-sm" onclick="selectAllNotes(false)">取消</button>
                <button class="btn btn-primary btn-sm" onclick="showExportModal()">📤 导出</button>
            </div>
        </div>
        <!-- 搜索 -->
        <div class="search-bar" style="margin-top:12px;">
            <input type="text" id="searchInput" placeholder="搜索标题/作者..." oninput="renderNotes()">
        </div>
        <!-- 分类标签 -->
        <div class="tabs" id="tabsBar"></div>
        <!-- 笔记网格 -->
        <div class="note-grid" id="noteGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="emoji">🔍</div>
            <p>没有匹配的笔记</p>
        </div>
    </div>

    <!-- 说明 -->
    <details class="help" style="padding:14px 18px;background:#fff;border-radius:12px;border:1px solid #eee;">
        <summary style="cursor:pointer;font-weight:600;color:#ff2442;">❓ 如何获取收藏链接？</summary>
        <div style="margin-top:10px;line-height:2;">
            1. 安装 <a href="https://github.com/JoeanAmier/XHS-Downloader" target="_blank">XHS-Downloader</a> 用户脚本（Tampermonkey）<br>
            2. 打开小红书网页版，进入「我的收藏」<br>
            3. 点击脚本菜单 →「提取收藏作品链接」<br>
            4. 复制所有链接，粘贴到上方输入框<br>
            5. 点击「解析笔记」等待完成 ✅
        </div>
    </details>

    <div class="footer">
        由 WorkBuddy 构建 · 数据仅在本地处理，不上传服务器<br>
        基于 <a href="https://github.com/JoeanAmier/XHS-Downloader" target="_blank">XHS-Downloader</a> 项目
    </div>
</div>

<script>
/* ============================================================
   全局状态
   ============================================================ */
let notes = [];       // 所有笔记数据
let categories = {};   // 分类 → 笔记ID列表
let currentCat = 'all'; // 当前选中的分类
let selected = {};     // 选中状态

/* ============================================================
   Toast 提示
   ============================================================ */
function showToast(msg, type) {
    type = type || '';
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(function() { t.classList.remove('show'); }, 2500);
}

/* ============================================================
   解析小红书链接
   从粘贴文本中提取所有 xiaohongshu.com 链接
   ============================================================ */
function extractLinks(text) {
    // 匹配 xiaohongshu.com/explore/ 或 xhslink.com 短链接
    const re = /https?:\/\/(www\.)?(xiaohongshu\.com\/explore\/[a-zA-Z0-9]+|xhslink\.com\/[^\s"'<>]+)/g;
    const matches = text.match(re) || [];
    // 去重
    return [...new Set(matches.map(function(u) { return u.trim(); }))];
}

/* ============================================================
   解析笔记 —— 主流程
   1. 提取链接
   2. 并发抓取每篇笔记的标题/封面/作者
   ============================================================ */
async function parseNotes() {
    const raw = document.getElementById('urlInput').value;
    const links = extractLinks(raw);

    if (links.length === 0) {
        showToast('未找到有效的小红书链接', 'error');
        return;
    }

    // 显示进度条
    const pw = document.getElementById('progressWrap');
    pw.classList.add('show');
    const bar = document.getElementById('progressBar');
    const txt = document.getElementById('progressText');
    const btn = document.getElementById('parseBtn');
    btn.disabled = true;

    notes = [];
    categories = { '未分类': [] };
    selected = {};

    // 并发抓取（每次最多 6 个）
    const BATCH = 6;
    for (let i = 0; i < links.length; i += BATCH) {
        const batch = links.slice(i, i + BATCH);
        const promises = batch.map(function(link, idx) {
            return fetchNoteInfo(link, i + idx);
        });
        await Promise.all(promises);

        // 更新进度
        const pct = Math.round((Math.min(i + BATCH, links.length) / links.length) * 100);
        bar.style.width = pct + '%';
        txt.textContent = '正在解析 ' + Math.min(i + BATCH, links.length) + ' / ' + links.length + ' ...';
    }

    bar.style.width = '100%';
    txt.textContent = '解析完成！共 ' + notes.length + ' 篇笔记';
    btn.disabled = false;

    // 自动猜测分类（根据标题关键词）
    guessCategories();

    // 显示操作区
    document.getElementById('actionCard').style.display = 'block';
    renderTabs();
    renderNotes();
    showToast('✅ 已解析 ' + notes.length + ' 篇笔记', 'success');
}

/* ============================================================
   抓取单篇笔记信息
   通过小红书公开 API 获取笔记详情
   ============================================================ */
async function fetchNoteInfo(url, index) {
    // 提取 note ID
    let noteId = '';
    const m1 = url.match(/explore\/([a-zA-Z0-9]+)/);
    const m2 = url.match(/xhslink\.com\/[^\s]+/);
    if (m1) noteId = m1[1];

    // 默认数据（抓取失败时保留链接）
    let note = {
        id: noteId || ('n' + index),
        url: url,
        title: '笔记 ' + (index + 1),
        author: '未知作者',
        cover: '',
        category: '未分类',
        desc: ''
    };

    try {
        // 尝试通过公开接口获取信息
        // 方式：使用小红书 web API（需要 note_id）
        if (noteId) {
            const apiUrl = 'https://edith.xiaohongshu.com/api/sns/web/v1/feed?note_id=' + noteId;
            const resp = await fetch(apiUrl, {
                headers: { 'Accept': 'application/json' }
            }).catch(function() { return null; });

            if (resp && resp.ok) {
                const data = await resp.json().catch(function() { return null; });
                if (data && data.data && data.data.items && data.data.items[0]) {
                    const item = data.data.items[0];
                    note.title = item.note_card?.display_title || item.note_card?.title || note.title;
                    note.author = item.note_card?.user?.nickname || note.author;
                    note.cover = item.note_card?.cover?.url_default || '';
                    note.desc = item.note_card?.desc || '';
                }
            }
        }
    } catch (e) { /* 静默失败，使用默认数据 */ }

    // 如果没有封面，用占位图
    if (!note.cover) {
        note.cover = 'data:image/svg+xml,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400">' +
            '<rect fill="%23f5f5f5" width="300" height="400"/>' +
            '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23ccc" font-size="40">📷</text>' +
            '</svg>'
        );
    }

    notes.push(note);
    if (!categories[note.category]) categories[note.category] = [];
    categories[note.category].push(note.id);
    selected[note.id] = false;
}

/* ============================================================
   自动猜测分类
   根据标题关键词将笔记归入不同分类
   ============================================================ */
function guessCategories() {
    const catKeywords = {
        '美食': ['美食', '食谱', '做饭', '烘焙', '餐厅', '探店', '吃', '料理', '厨房'],
        '穿搭': ['穿搭', '搭配', '衣服', ' Fashion', 'ootd', '时尚', '服装'],
        '旅行': ['旅行', '旅游', '出行', '景点', '攻略', '民宿', '酒店'],
        '美妆': ['美妆', '化妆', '口红', '护肤', '面膜', '香水', '防晒'],
        '家居': ['家居', '装修', '家具', '收纳', '布置', '租房', '改造'],
        '健身': ['健身', '运动', '减肥', '跑步', '瑜伽', '锻炼', '塑形'],
        '学习': ['学习', '考研', '英语', '读书', '笔记', '考试', '大学'],
        '数码': ['数码', '手机', '电脑', '相机', '耳机', '测评', '科技'],
        '萌宠': ['猫', '狗', '宠物', '萌宠', '猫咪', '狗狗', '铲屎'],
        '情感': ['情感', '恋爱', '心理', '治愈', '成长', '人生']
    };

    notes.forEach(function(note) {
        let matched = false;
        const title = note.title + ' ' + (note.desc || '');
        for (const cat in catKeywords) {
            for (const kw of catKeywords[cat]) {
                if (title.indexOf(kw) !== -1) {
                    note.category = cat;
                    // 重新归类
                    for (const c in categories) {
                        categories[c] = categories[c].filter(function(id) { return id !== note.id; });
                    }
                    if (!categories[cat]) categories[cat] = [];
                    categories[cat].push(note.id);
                    matched = true;
                    break;
                }
            }
            if (matched) break;
        }
    });

    // 清理空分类
    for (const c in categories) {
        if (categories[c].length === 0) delete categories[c];
    }
}

/* ============================================================
   渲染分类标签栏
   ============================================================ */
function renderTabs() {
    const bar = document.getElementById('tabsBar');
    const cats = ['all'].concat(Object.keys(categories).filter(function(c) { return c !== 'all'; }));
    bar.innerHTML = cats.map(function(c) {
        const label = c === 'all' ? '全部' : c;
        const count = c === 'all' ? notes.length : categories[c].length;
        return '<button class="tab' + (currentCat === c ? ' active' : '') +
            '" onclick="switchCat(\'' + c + '\')">' + label + ' (' + count + ')</button>';
    }).join('');
}

/* ============================================================
   切换分类
   ============================================================ */
function switchCat(cat) {
    currentCat = cat;
    renderTabs();
    renderNotes();
}

/* ============================================================
   渲染笔记网格
   ============================================================ */
function renderNotes() {
    const grid = document.getElementById('noteGrid');
    const empty = document.getElementById('emptyState');
    const search = document.getElementById('searchInput').value.trim().toLowerCase();

    // 筛选当前分类 + 搜索关键词
    let list = currentCat === 'all' ? notes.slice() :
        (categories[currentCat] || []).map(function(id) {
            return notes.find(function(n) { return n.id === id; });
        }).filter(Boolean);

    if (search) {
        list = list.filter(function(n) {
            return (n.title || '').toLowerCase().indexOf(search) !== -1 ||
                   (n.author || '').toLowerCase().indexOf(search) !== -1;
        });
    }

    // 更新统计
    document.getElementById('totalCount').textContent = list.length;

    if (list.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    grid.innerHTML = list.map(function(note) {
        const isSel = selected[note.id] ? ' selected' : '';
        return '<div class="note-card' + isSel + '" onclick="toggleSelect(\'' + note.id + '\', event)">' +
            '<div class="check">✓</div>' +
            '<span class="cat-badge">' + escapeHtml(note.category) + '</span>' +
            '<img class="cover" src="' + (note.cover || '') + '" alt="" loading="lazy"' +
            ' onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22%3E%3Crect fill=%22%23f5f5f5%22 width=%22300%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23ccc%22 font-size=%2240%22%3E📷%3C/text%3E%3C/svg%3E\'">' +
            '<div class="info">' +
                '<div class="title">' + escapeHtml(note.title) + '</div>' +
                '<div class="author">by ' + escapeHtml(note.author) + '</div>' +
            '</div>' +
        '</div>';
    }).join('');
}

/* ============================================================
   切换选中状态
   ============================================================ */
function toggleSelect(id, event) {
    // 阻止 a 标签跳转
    if (event.target.tagName === 'A') return;
    selected[id] = !selected[id];
    renderNotes();
}

function selectAllNotes(on) {
    const list = currentCat === 'all' ? notes : (categories[currentCat] || []).map(function(id) {
        return notes.find(function(n) { return n.id === id; });
    }).filter(Boolean);
    list.forEach(function(n) { selected[n.id] = on; });
    renderNotes();
}

/* ============================================================
   显示导出弹窗
   ============================================================ */
function showExportModal() {
    const selCount = Object.values(selected).filter(Boolean).length;
    if (selCount === 0) {
        showToast('请先选择要导出的笔记', 'error');
        return;
    }
    document.getElementById('exportModal').classList.add('show');
}

/* ============================================================
   导出功能
   ============================================================ */
function exportAs(format) {
    document.getElementById('exportModal').classList.remove('show');

    const selNotes = notes.filter(function(n) { return selected[n.id]; });
    if (selNotes.length === 0) {
        showToast('请先选择笔记', 'error');
        return;
    }

    let content = '';
    let filename = '小红书收藏';
    let mime = 'text/plain;charset=utf-8';

    if (format === 'html') {
        // 生成可视化的 HTML 收藏页
        content = generateHTML(selNotes);
        filename += '.html';
        mime = 'text/html;charset=utf-8';
    } else if (format === 'md') {
        content = generateMarkdown(selNotes);
        filename += '.md';
    } else if (format === 'json') {
        content = JSON.stringify(selNotes, null, 2);
        filename += '.json';
    } else if (format === 'bookmarks') {
        content = generateBookmarks(selNotes);
        filename += '_bookmarks.html';
        mime = 'text/html;charset=utf-8';
    }

    downloadFile(content, filename, mime);
    showToast('✅ 已导出 ' + selNotes.length + ' 篇笔记', 'success');
}

/* ============================================================
   生成 HTML 收藏页
   ============================================================ */
function generateHTML(notesData) {
    const cats = {};
    notesData.forEach(function(n) {
        if (!cats[n.category]) cats[n.category] = [];
        cats[n.category].push(n);
    });

    let body = '';
    for (const cat in cats) {
        body += '<section style="margin-bottom:32px;">' +
            '<h2 style="font-size:18px;margin-bottom:16px;color:#ff2442;">📁 ' + escapeHtml(cat) + ' (' + cats[cat].length + ')</h2>' +
            '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">';
        cats[cat].forEach(function(n) {
            body += '<a href="' + escapeHtml(n.url) + '" target="_blank" style="text-decoration:none;color:inherit;">' +
                '<div style="border:1px solid #eee;border-radius:12px;overflow:hidden;background:#fff;">' +
                    '<img src="' + (n.cover || '') + '" style="width:100%;aspect-ratio:3/4;object-fit:cover;" onerror="this.style.display=\'none\'">' +
                    '<div style="padding:12px;">' +
                        '<div style="font-size:14px;font-weight:600;margin-bottom:6px;">' + escapeHtml(n.title) + '</div>' +
                        '<div style="font-size:12px;color:#999;">by ' + escapeHtml(n.author) + '</div>' +
                    '</div>' +
                '</div></a>';
        });
        body += '</div></section>';
    }

    return '<!DOCTYPE html>\n<html lang="zh-CN"><head><meta charset="UTF-8">' +
        '<meta name="viewport" content="width=device-width,initial-scale=1.0">' +
        '<title>我的小红书收藏</title>' +
        '<style>body{font-family:-apple-system,sans-serif;max-width:900px;margin:0 auto;padding:24px 16px;background:#f7f8fa;}</style>' +
        '</head><body>' +
        '<h1 style="color:#ff2442;text-align:center;">📕 我的小红书收藏</h1>' +
        '<p style="text-align:center;color:#999;margin-bottom:32px;">共 ' + notesData.length + ' 篇笔记，按分类整理</p>' +
        body + '</body></html>';
}

/* ============================================================
   生成 Markdown
   ============================================================ */
function generateMarkdown(notesData) {
    const cats = {};
    notesData.forEach(function(n) {
        if (!cats[n.category]) cats[n.category] = [];
        cats[n.category].push(n);
    });

    let md = '# 📕 我的小红书收藏\n\n> 共 ' + notesData.length + ' 篇笔记，按分类整理\n\n';
    for (const cat in cats) {
        md += '## 📁 ' + cat + '（' + cats[cat].length + '）\n\n';
        cats[cat].forEach(function(n, i) {
            md += (i + 1) + '. [' + n.title + '](' + n.url + ') — *by ' + n.author + '*\n';
        });
        md += '\n';
    }
    return md;
}

/* ============================================================
   生成浏览器书签 HTML
   ============================================================ */
function generateBookmarks(notesData) {
    const cats = {};
    notesData.forEach(function(n) {
        if (!cats[n.category]) cats[n.category] = [];
        cats[n.category].push(n);
    });

    let html = '<!DOCTYPE NETSCAPE-Bookmark-file-1>\n' +
        '<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">\n' +
        '<TITLE>小红书收藏</TITLE>\n<H1>小红书收藏</H1>\n<DL><p>\n';

    for (const cat in cats) {
        html += '    <DT><H3>' + escapeHtml(cat) + '</H3>\n    <DL><p>\n';
        cats[cat].forEach(function(n) {
            html += '        <DT><A HREF="' + escapeHtml(n.url) + '">' + escapeHtml(n.title) + '</A>\n';
        });
        html += '    </DL><p>\n';
    }
    html += '</DL><p>';
    return html;
}

/* ============================================================
   文件下载
   ============================================================ */
function downloadFile(content, filename, mime) {
    const blob = new Blob([content], { type: mime || 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
}

/* ============================================================
   HTML 转义
   ============================================================ */
function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}
</script>
